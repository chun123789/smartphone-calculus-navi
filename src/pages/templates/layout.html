<!doctype html>
<html lang="ja" data-theme="auto">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1020">
    <script>
      (function() {
        try {
          var saved = localStorage.getItem("theme-preference");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = saved === "light" || saved === "dark" ? saved : (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (_e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/assets/styles/base.css">
    <link rel="stylesheet" href="/assets/styles/layout.css">
    <link rel="stylesheet" href="/assets/styles/components.css">
    <link rel="stylesheet" href="/assets/styles/article.css">
    {{head_tags}}
    <script type="module" src="/assets/js/mathjax-config.js"></script>
  </head>
  <body class="{{body_class}}" data-cf-beacon-token="">
    <a class="skip-link" href="#main-content">本文へスキップ</a>
    {{header}}
    <main id="main-content" class="main-content" tabindex="-1">
      {{breadcrumb}}
      {{main}}
    </main>
    {{footer}}
    <script type="module" src="/assets/js/main.js"></script>
    {{page_script}}
  </body>
</html>
